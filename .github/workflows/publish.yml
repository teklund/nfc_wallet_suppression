name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*" # Matches v1.0.0, v1.0.0-beta.1, etc.; tag/pubspec consistency validated in verify job

permissions:
  contents: read # Default: minimal privilege; jobs override as needed

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Strip 'version:' prefix, quotes, and inline comments — handles version: "1.0.0" and version: 1.0.0
          PUBSPEC_VERSION=$(grep '^[[:space:]]*version:' pubspec.yaml | sed 's/^[[:space:]]*version:[[:space:]]*//' | sed "s/['\"]//g" | sed 's/[[:space:]#].*//' | head -n 1)
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "❌ Could not determine version from pubspec.yaml"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "❌ Version mismatch! Tag: $TAG_VERSION, pubspec.yaml: $PUBSPEC_VERSION"
            exit 1
          fi
          echo "✅ Version matches: $TAG_VERSION" >> "$GITHUB_STEP_SUMMARY"

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Run pana
        run: |
          dart pub global activate pana
          dart pub global run pana --no-warning --exit-code-threshold 80

      - name: Dry run publish
        run: flutter pub publish --dry-run

  publish:
    name: Publish to pub.dev
    needs: verify
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev
      contents: read
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: pub.dev # Requires a matching GitHub Actions environment for approval gating

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Full history needed for generate_release_notes

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-') }}
